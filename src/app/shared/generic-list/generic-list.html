<div class="generic-list-container">

    <div class="list-header">
        <h2>{{ config.iconaTitolo }} {{ config.titolo }}</h2>
        <button mat-raised-button color="primary" (click)="apriNuovo()">
            <mat-icon>add</mat-icon>
            Nuovo
        </button>
    </div>

    @if (isLoading()) {
        <p>Caricamento... ⏳</p>
    } @else {

    <div class="table-container mat-elevation-z8">
        <table mat-table [dataSource]="lista()" class="full-width-table">

            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef> ID </th>
                <td mat-cell *matCellDef="let record"> {{ record.id }} </td>
            </ng-container>

            <ng-container matColumnDef="valore">
                <th mat-header-cell *matHeaderCellDef> {{ config.labelCampo }} </th>
                <td mat-cell *matCellDef="let record">
                    <strong>{{ record[config.campoTesto] }}</strong>
                </td>
            </ng-container>

            <ng-container matColumnDef="azioni">
                <th mat-header-cell *matHeaderCellDef> Azioni </th>
                <td mat-cell *matCellDef="let record" class="azioni-cell">
                    <button mat-icon-button color="primary"
                            (click)="apriModifica(record)"
                            matTooltip="Modifica">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button color="warn"
                            (click)="apriConfermaEliminazione(record)"
                            matTooltip="Elimina">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="colonneMostrate"></tr>
            <tr mat-row *matRowDef="let row; columns: colonneMostrate;" class="hover-row"></tr>
        </table>

        <div class="custom-paginator-wrapper">
            <mat-paginator
                [length]="totale()"
                [pageSize]="elementiPerPagina()"
                [pageIndex]="paginaCorrente()"
                (page)="cambiaPagina($event)"
                [hidePageSize]="true"
                showFirstLastButtons
                aria-label="Seleziona pagina">
            </mat-paginator>

            <div class="jump-to-page">
                <label>Vai a pagina:</label>
                <input type="number" min="1" [max]="pagineTotali()" [value]="paginaCorrente() + 1" #pageInput
                    (keyup.enter)="saltaAPagina(pageInput)" (blur)="saltaAPagina(pageInput)">
                <span>di {{ pagineTotali() }}</span>
            </div>
        </div>

        @if (lista().length === 0) {
            <div class="empty-state">Nessun elemento trovato.</div>
        }
    </div>
    }
</div>
